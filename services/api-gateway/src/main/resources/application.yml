spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            maxAge: 3600

      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"

      routes:
        - id: auth-public
          uri: http://exchange-account-service:8082
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: account-service-cb
                fallbackUri: forward:/fallback

        - id: account-service
          uri: http://exchange-account-service:8082
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - JwtAuthentication
            - name: CircuitBreaker
              args:
                name: account-service-cb
                fallbackUri: forward:/fallback

        - id: order-service
          uri: http://exchange-order-service:8081
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - JwtAuthentication
            - name: CircuitBreaker
              args:
                name: order-service-cb
                fallbackUri: forward:/fallback

        - id: market-data-service
          uri: http://exchange-market-data:8083
          predicates:
            - Path=/api/v1/market/**

        - id: market-ws
          uri: ws://exchange-market-data:8083
          predicates:
            - Path=/ws/**

        - id: settlement-service
          uri: http://exchange-settlement-service:8085
          predicates:
            - Path=/api/v1/settlements/**
          filters:
            - JwtAuthentication
            - name: CircuitBreaker
              args:
                name: settlement-service-cb
                fallbackUri: forward:/fallback

        - id: trading-engine
          uri: http://exchange-trading-engine:8084
          predicates:
            - Path=/api/v1/orderbook/**
          filters:
            - name: CircuitBreaker
              args:
                name: trading-engine-cb
                fallbackUri: forward:/fallback

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      order-service-cb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      account-service-cb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      settlement-service-cb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      trading-engine-cb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

jwt:
  secret: ${JWT_SECRET:order-system-jwt-secret-key-must-be-at-least-256-bits-long}

logging:
  level:
    com.exchange.gateway: DEBUG
    org.springframework.cloud.gateway: WARN