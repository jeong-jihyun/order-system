services:

  # ─────────────────────────────────────────────
  # Database
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: order-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-orderdb}
      MYSQL_USER: ${MYSQL_USER:-orderuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-orderpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - order-network

  # ─────────────────────────────────────────────
  # Cache (Week 2에서 본격 활용)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: order-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - order-network

  # ─────────────────────────────────────────────
  # Message Broker (Week 2에서 본격 활용)
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: order-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - order-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: order-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - order-network

  # Kafka 모니터링 UI — http://localhost:9000
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: order-kafdrop
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    networks:
      - order-network

  # ─────────────────────────────────────────────
  # Application
  # ─────────────────────────────────────────────
  spring-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: order-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-orderdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-orderuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-orderpassword}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - order-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: order-frontend
    depends_on:
      - spring-app
    ports:
      - "3000:80"
    networks:
      - order-network

  # ─────────────────────────────────────────────
  # CI/CD
  # ─────────────────────────────────────────────
  # Jenkins 관리 UI — http://localhost:8090
  # 초기 Admin 비밀번호: docker compose logs jenkins
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: order-jenkins
    privileged: true
    user: root
    ports:
      - "8090:8080"    # Jenkins UI
      - "50000:50000"  # Jenkins Agent 통신 포트
    volumes:
      - jenkins-data:/var/jenkins_home          # Jenkins 설정 영속화
      - /var/run/docker.sock:/var/run/docker.sock  # Docker 소켓 마운트 (DinD)
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
    networks:
      - order-network

# ─────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────
volumes:
  mysql-data:
  redis-data:
  jenkins-data:

networks:
  order-network:
    driver: bridge
